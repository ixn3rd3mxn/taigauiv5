<tui-root>
    <header tuiNavigationHeader>
        <button
            title="Menu"
            tuiIconButton
            tuiNavigationDrawer
            type="button"
            [(open)]="open"
        >
            <tui-data-list>
                @for (group of drawer | keyvalue; track group) {
                    <tui-opt-group [label]="group.key">
                        @for (item of group.value; track item) {
                            <button
                                tuiOption
                                type="button"
                                (click)="open = false"
                            >
                                <img
                                    alt="icon"
                                    [src]="item.icon"
                                />
                                {{ item.name }}
                            </button>
                        }
                    </tui-opt-group>
                }
                <hr />
                <tui-opt-group>
                    <label tuiOption>
                        <input
                            size="s"
                            tuiSwitch
                            type="checkbox"
                            [(ngModel)]="switch"
                        />
                        Dark mode
                    </label>
                </tui-opt-group>
            </tui-data-list>
        </button>
        <span tuiNavigationLogo>
            <tui-icon icon="@tui.home" />
            <span tuiFade>ศูนย์รับแจ้งเหตุฯ ปัตตานี</span>
            <!-- <div tuiBadge>pre-alpha-1.1.1</div> -->
        </span>

    </header>
    <div [style.display]="'flex'">
    <aside
        [tuiNavigationAside]="expanded()"
          [style.height]="'calc(100vh - 3rem)'"
    >
            <header>
                <button
                    iconStart="@tui.home"
                    type="button"
                    [tuiAsideItem]="hint"
                >
                    <ng-container [ngTemplateOutlet]="hint" />
                    <ng-template #hint>
                        <span tuiFade>หน้าหลัก</span>
                        <div
                            appearance="accent"
                            tuiBadge
                        >
                            Alpha
                        </div>
                    </ng-template>
                </button>
            </header>
            <tui-aside-group>
                <button
                    iconStart="@tui.layout-dashboard"
                    tuiAsideItem
                    tuiChevron
                    type="button"
                >
                    รายงานรับแจ้งเหตุ
                    <ng-template>
                        <button
                            tuiAsideItem
                            type="button"
                        >
                            แดชบอร์ด
                        </button>
                        <button
                            tuiAsideItem
                            type="button"
                        >
                            สรุปผล
                        </button>
                        <button
                            tuiAsideItem
                            type="button"
                        >
                            จัดการข้อมูล
                        </button>
                    </ng-template>
                </button>
            </tui-aside-group>
            <tui-aside-group>
                <button
                    iconStart="@tui.map"
                    tuiAsideItem
                    tuiChevron
                    type="button"
                >
                    รวมหน่วยกู้ชีพ
                    <ng-template>
                        <button
                            tuiAsideItem
                            type="button"
                        >
                            แผนที่
                        </button>
                        <button
                            tuiAsideItem
                            type="button"
                        >
                            สรุปผล
                        </button>
                        <button
                            tuiAsideItem
                            type="button"
                        >
                            จัดการข้อมูล
                        </button>
                    </ng-template>
                </button>
            </tui-aside-group>
            <a
                iconStart="@tui.users"
                tuiAsideItem
                routerLink="/"
            >
                เทส
            </a>
            <tui-aside-group>
                <button
                    iconStart="@tui.settings"
                    tuiAsideItem
                    tuiChevron
                    type="button"
                >
                    เทส
                    <ng-template>
                        <button
                            tuiAsideItem
                            type="button"
                        >
                            เทส
                        </button>
                    </ng-template>
                </button>
            </tui-aside-group>
            <button
                iconStart="@tui.heart"
                tuiAsideItem
                type="button"
            >
                <span tuiFade>เทส</span>
            </button>
            <button
                iconStart="@tui.search"
                tuiAsideItem
                type="button"
            >
                เทส
                @if (expanded()) {
                    <div
                        appearance="accent"
                        tuiBadge
                    >
                        12
                    </div>
                }
            </button>
            <button
                iconEnd="@tui.chevron-right"
                iconStart="@tui.ellipsis"
                tuiAsideItem
                tuiDropdownAuto
                tuiDropdownHover
                type="button"
                [tuiDropdown]="more"
            >
                เทส
                <ng-template
                    #more
                    let-close
                >
                    <tui-data-list tuiDataListDropdownManager>
                        <button
                            iconStart="@tui.pencil"
                            tuiAsideItem
                            type="button"
                        >
                            เทส
                        </button>
                        <button
                            iconStart="@tui.pie-chart"
                            tuiAsideItem
                            type="button"
                            [tuiDropdown]="submenu"
                        >
                            เทส
                            <ng-template #submenu>
                                <tui-data-list>
                                    <button
                                        tuiAsideItem
                                        type="button"
                                        (click)="close()"
                                    >
                                        เทส
                                    </button>
                                    <button
                                        tuiAsideItem
                                        type="button"
                                    >
                                        เทส
                                    </button>
                                </tui-data-list>
                            </ng-template>
                        </button>
                    </tui-data-list>
                </ng-template>
            </button>
            <hr />
            <button
                iconStart="@tui.plus"
                tuiAsideItem
                type="button"
            >
                เทส
            </button>
            <footer>
                <button
                    iconStart="@tui.star"
                    tuiAsideItem
                    type="button"
                >
                    เทส
                </button>
                <button
                    tuiAsideItem
                    type="button"
                    [iconStart]="expanded() ? '@tui.arrow-left-to-line' : '@tui.arrow-right-to-line'"
                    (click)="handleToggle()"
                >
                    {{ expanded() ? 'ซ่อนแถบ' : 'แสดงแถบ' }}
                </button>
            </footer>
        </aside>
        <main tuiNavigationMain>
            <nav
                compact
                tuiSubheader
                [style.position]="'sticky'"
            >
                <!-- <tui-breadcrumbs [itemsLimit]="10">
                    @for (item of breadcrumbs; track item) {
                        @if ($last) {
                            <strong
                                *tuiItem
                                tuiFade
                            >
                                {{ item }}
                            </strong>
                        }
                        @if (!$last) {
                            <button
                                *tuiItem
                                tuiLink
                                type="button"
                            >
                                {{ item }}
                            </button>
                        }
                    }
                </tui-breadcrumbs> -->
                
                <tui-textfield
                    [style.width.rem]="7.04"
                    [tuiTextfieldCleaner]="false"
                >
                    <input
                        tuiInputDate
                        [max]="dateMax"
                        [min]="dateMin"
                        [(ngModel)]="dateValue"
                        (keydown)="$event.preventDefault()"
                    />
                    <tui-calendar *tuiDropdown />
                </tui-textfield>
                
                <tui-textfield tuiChevron
                    [style.width.rem]="4.22"
                    [tuiTextfieldCleaner]="false"
                >
                    <input
                        tuiSelect
                        [(ngModel)]="selectedShift"
                    />
                    <tui-data-list-wrapper
                        *tuiDropdown
                        [items]="shifts"
                    />
                </tui-textfield>

                <!-- <tui-tabs tuiFade>
                    <button
                        tuiTab
                        type="button"
                    >
                        Default view
                    </button>
                    <button
                        tuiTab
                        type="button"
                    >
                        Details
                    </button>
                    <button
                        tuiTab
                        type="button"
                    >
                        Followers
                    </button>
                </tui-tabs> -->
                
                <button
                    tuiButton
                    type="button"
                    (click)="resetToToday()"
                >
                    วันนี้
                </button>
                <button
                    appearance="primary"
                    tuiButton
                    type="button"
                >
                    กำหนดเจ้าหน้าที่
                </button>
                <button
                    tuiButton
                    type="button"
                >
                    บันทึกเหตุ
                </button>
            </nav>
            <ng-container>
                @for (_ of '-'.repeat(10); track $index) {
                    <form
                        appearance="floating"
                        tuiCardLarge
                        tuiForm="m"
                        [style.grid-column]="'2 / span 7'"
                    >
                        <header tuiHeader>
                            <h2 tuiTitle>
                                Registration form
                                <span tuiSubtitle>Tell us about yourself</span>
                            </h2>
                        </header>
                        <tui-textfield>
                            <label tuiLabel>Name</label>
                            <input
                                placeholder="John Wick"
                                tuiInput
                            />
                        </tui-textfield>
                        <footer>
                            <button
                                appearance="secondary"
                                tuiButton
                                type="button"
                            >
                                Cancel
                            </button>
                            <button
                                tuiButton
                                type="submit"
                            >
                                Ok
                            </button>
                        </footer>
                    </form>
                    <div
                        appearance="outline-grayscale"
                        tuiCardLarge
                        [style.grid-column]="'span 3'"
                    >
                        <h2 tuiTitle>
                            Sidebar content
                            <span tuiSubtitle>Use CSS grid to position</span>
                        </h2>
                    </div>
                }
            </ng-container>
        </main>
    </div>
</tui-root>
